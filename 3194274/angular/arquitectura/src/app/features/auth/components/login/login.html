<div class="login-page">

  <div class="login-card">

    <div class="logo-container">
      <h1 class="title">Angular Architecture</h1>
      <p class="subtitle">
        Inicia sesión para visualizar usuarios
      </p>
    </div>

    <form class="login-form">

      <div class="form-group">
        <label for="username">Usuario</label>

        <input [(ngModel)]="userInput" [ngModelOptions]="{standalone: true}" id="username" type="text"
          placeholder="ejemplo123" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>

        <input [(ngModel)]="passwordInput" [ngModelOptions]="{standalone: true}" id="password" type="password"
          placeholder="********" />
      </div>

      <button (click)="onClick()" type="submit">
        Iniciar sesión
      </button>

    </form>

  </div>

</div>
