<h1 *ngIf="isAuthenticated; else noLogueado">Estas logueado</h1>

<ng-template #noLogueado>
  <h1>No estas logueado, no puedes ver la información</h1>
</ng-template>

<button (click)="toggle()">{{ isAuthenticated ? 'Cerrar' : 'Iniciar' }} sesión</button>
