<div class="container">
  <h1>Angular + Express JWT</h1>

  <div class="card">
    <h2>Login</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Ingresa tu email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Ingresa tu contraseña" />
    </div>

    <div class="actions">
      <button (click)="login()" [disabled]="loadingLogin">
        {{ loadingLogin ? 'Ingresando...' : 'Login' }}
      </button>

      <button (click)="loadProfile()" [disabled]="loadingProfile">
        {{ loadingProfile ? 'Consultando...' : 'Ver perfil' }}
      </button>

      <button (click)="logout()">Logout</button>
    </div>

    <p *ngIf="successMessage" class="success">
      {{ successMessage }}
    </p>

    <p *ngIf="errorMessage" class="error">
      {{ errorMessage }}
    </p>
  </div>

  <div class="card" *ngIf="profile">
    <h2>Perfil</h2>

    <p><strong>ID:</strong> {{ profile.id }}</p>
    <p><strong>Nombre:</strong> {{ profile.name }}</p>
    <p><strong>Email:</strong> {{ profile.email }}</p>
    <p><strong>Emitido en:</strong> {{ profile.iat }}</p>
    <p><strong>Expira en:</strong> {{ profile.exp }}</p>
  </div>
</div>
