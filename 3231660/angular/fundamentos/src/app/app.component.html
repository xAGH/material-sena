<div class="wrapper">
  <div class="card">
    <div class="top-controls">
      <app-button text="-" (buttonClick)="down()"></app-button>
      <span class="value"> {{ counter }} </span>
      <app-button text="+" (buttonClick)="up()"></app-button>
    </div>

    <app-button text="C" (buttonClick)="clear()"></app-button>
  </div>
</div>
