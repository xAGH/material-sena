<div class="user-list-container">

  <button (click)="onClick()" class="logout-btn">
    Cerrar sesión
  </button>

  <div class="header">
    <h1>Usuarios</h1>
    <p>Listado de usuarios registrados</p>
  </div>

  <div class="users-grid">
    <app-user-card *ngFor="let user of users" [user]="user">
    </app-user-card>
  </div>
</div>
