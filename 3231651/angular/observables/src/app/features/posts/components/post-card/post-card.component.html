<article class="post-card">
  <div class="post-card__header">
    <span class="post-card__id">#{{ post.id }}</span>
    <span class="post-card__author">
      Usuario {{ post.userId }}
    </span>
  </div>

  <h3 class="post-card__title">
    {{ post.title }}
  </h3>

  <p class="post-card__body">
    {{ post.body }}
  </p>

  <button class="post-card__button">
    Ver más
  </button>
</article>
