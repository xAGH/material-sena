<div class="product-form">
  <h2>{{ title }}</h2>

  <div>
    <div class="form-group">
      <label for="name">Nombre del producto</label>
      <input
        [(ngModel)]="name"
        id="name"
        type="text"
        placeholder="Ej: Laptop"
      />
    </div>

    <div class="form-group">
      <label for="price">Precio</label>
      <input
        [(ngModel)]="price"
        id="price"
        type="number"
        placeholder="Ej: 2500"
      />
    </div>

    <button (click)="emitProductCreated()" type="submit">Crear producto</button>
  </div>
</div>
